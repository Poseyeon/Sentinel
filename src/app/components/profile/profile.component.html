<div class="profile-container">
  <mat-card class="profile-card">
    <mat-card-header>
      <div class="header-content">
        <button mat-icon-button (click)="goBack()" title="Back to Dashboard">
          <mat-icon>arrow_back</mat-icon>
        </button>
        <mat-card-title>User Profile</mat-card-title>
      </div>
    </mat-card-header>

    <mat-card-content class="profile-content">
      <div *ngIf="isLoading" class="loading-spinner">
        <mat-spinner diameter="50"></mat-spinner>
      </div>

      <ng-container *ngIf="!isLoading && user">
        <div class="avatar-section">
          <app-profile-avatar [userId]="userId"></app-profile-avatar>
        </div>

        <div class="info-section">
          <div class="info-item">
            <span class="label">First Name:</span>
            <span class="value">{{ user.firstname }}</span>
          </div>
          <div class="info-item">
            <span class="label">Surname:</span>
            <span class="value">{{ user.surname }}</span>
          </div>
          <div class="info-item">
            <span class="label">Role:</span>
            <span class="value">{{ user.role }}</span>
          </div>
        </div>
      </ng-container>

      <div *ngIf="!isLoading && !user" class="error-message">
        <p>User details could not be loaded.</p>
        <button mat-stroked-button color="primary" (click)="loadUserDetails()">Retry</button>
      </div>
    </mat-card-content>
  </mat-card>
</div>
